<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🧀 Mercor News Watcher</title>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600&family=Georgia&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: Georgia, serif;
      background: #FFFBEA;
      background-image: radial-gradient(#FDE68A 15%, transparent 16%),
                         radial-gradient(#FDE68A 15%, transparent 16%);
      background-size: 60px 60px;
      background-position: 0 0, 30px 30px;
      max-width: 600px;
      margin: 40px auto;
      padding: 24px;
    }
    h1 {
      font-family: "Baloo 2", cursive;
      color: #D2691E;
      font-size: 28px;
      margin-bottom: 4px;
    }
    .tagline { color: #B8860B; margin-bottom: 24px; }
    #last-checked { color: #8B6508; margin-bottom: 24px; font-style: italic; }
    .article {
      background: #FFF8DC;
      border: 2px solid #F4C430;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .article a {
      text-decoration: none;
      color: #B8860B;
      font-weight: bold;
      font-size: 16px;
    }
    .article .date { color: #8B6508; font-size: 12px; margin-top: 4px; }
    .article .summary { color: #4A3B00; font-size: 14px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>🧀 Mercor News Watcher</h1>
  <p class="tagline">Freshest Mercor news, served melty and warm.</p>
  <p id="last-checked">Loading...</p>
  <div id="articles"></div>

  <script>
    fetch("status.json")
      .then(response => response.json())
      .then(status => {
        document.getElementById("last-checked").textContent =
          "Last checked: " + new Date(status.last_checked).toLocaleString();

        const container = document.getElementById("articles");
        if (status.articles.length === 0) {
          container.textContent = "No alerts sent yet. Still aging.";
          return;
        }

        status.articles.slice().reverse().forEach(article => {
          const div = document.createElement("div");
          div.className = "article";
          div.innerHTML = `
            <a href="${article.link}" target="_blank">🧀 ${article.title}</a>
            <div class="date">${article.date || ""}</div>
            <div class="summary">${article.summary || ""}</div>
          `;
          container.appendChild(div);
        });
      });
  </script>
</body>
</html>
